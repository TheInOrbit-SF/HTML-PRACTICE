<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My First Website</title>
  <link rel="stylesheet" href="css/styles.css" type="text/css">
</head>
<style>
* {
  box-sizing: border-box;
}
body {
  font-family: "Segoe UI", Roboto, sans-serif;
  margin: 0;
  background: #f4f7fb;
  color: #253238;
}
header {
  background: linear-gradient(120deg, black, purple);
  color: #fff;
  padding: 60px 20px;
  text-align: center;
}
main {
  max-width: 960px;
  margin: 0 auto;
  padding: 40px 20px;
}
section {
  background: #fff;
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 24px;
  box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
}
section h2 {
  margin-top: 0;
  color: #04AA6D;
}
footer {
  padding: 24px;
  text-align: center;
  background: #e8edf4;
  font-size: 0.9rem;
}
</style>
<body>
  <header>
    <h1>Hello, world!</h1>
    <p>This site is built with HTML and CSS.</p>
  </header>
  <main>
    <section>
      <h2>About Me</h2>
      <p>I am learning how to code websites from scratch.</p>
    </section>
    <section>
      <h2>Projects</h2>
      <ul>
        <li>Portfolio landing page</li>
        <li>Product showcase</li>
        <li>Responsive blog layout</li>
      </ul>
    </section>
    <section>
	<h2>FISH</h2>
	<p>I am just A FISH</p>
    </section>
  </main>
  <footer>
    <p>Built with ❤️ using HTML & CSS.</p>
  </footer>
</body>
</html>
